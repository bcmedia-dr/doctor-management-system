<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCM 醫師管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .main-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
            margin: 0 auto;
            max-width: 1400px;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .stat-card h3 {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .table-container {
            max-height: 600px;
            overflow-y: auto;
        }
        .btn-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
        .btn-custom:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
        }
        .header-title {
            color: #667eea;
            font-weight: bold;
        }
        .badge-status {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
        }
        .search-section {
            background: #f8f9fa;
            padding: 20px;
            overflow: visible;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .search-section .form-control,
        .search-section .form-select {
            border-radius: 8px;
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
        }
        .search-section .form-control:focus,
        .search-section .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
        .filter-group {
            flex: 1 1 130px;
            min-width: 110px;
            max-width: 160px;
        }
        .filter-group.small {
            flex: 0 0 auto;
            min-width: 100px;
        }
        .filter-group.search {
            flex: 1 1 160px;
            min-width: 150px;
            max-width: 200px;
        }
        .specialty-menu {
            max-height: 280px;
            overflow-y: auto;
            min-width: 160px;
            z-index: 1055;
        }
        .specialty-menu .dropdown-item {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        th[onclick]:hover {
            background-color: #e9ecef;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            flex-wrap: nowrap;
            flex: 0 0 auto;
            align-items: center;
        }
        .action-buttons .btn {
            white-space: nowrap;
            min-width: fit-content;
            flex-shrink: 0;
            padding: 6px 10px;
            font-size: 13px;
        }
        @media (max-width: 768px) {
            .filter-group {
                flex: 1 1 100%;
            }
            .action-buttons {
                justify-content: stretch;
                flex-wrap: wrap;
            }
            .action-buttons .btn {
                flex: 1 1 auto;
                min-width: 120px;
            }
        }
        
        /* 表格整體優化 */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .table {
            width: 100%;
            min-width: 1200px; /* 確保表格最小寬度 */
            table-layout: fixed; /* 固定表格佈局 */
        }
        
        /* 欄位寬度分配 */
        .table colgroup col:nth-child(1) { width: 4%; }   /* 編號 */
        .table colgroup col:nth-child(2) { width: 8%; }   /* 醫師 */
        .table colgroup col:nth-child(3) { width: 7%; }   /* 科別 */
        .table colgroup col:nth-child(4) { width: 5%; }   /* 性別 */
        .table colgroup col:nth-child(5) { width: 7%; }   /* 狀態 */
        .table colgroup col:nth-child(6) { width: 8%; }   /* 聯絡窗口 */
        .table colgroup col:nth-child(7) { width: 18%; }  /* 合作品牌 - 最寬 */
        .table colgroup col:nth-child(8) { width: 10%; }  /* 報價區間 */
        .table colgroup col:nth-child(9) { width: 7%; }   /* 經營社群 */
        .table colgroup col:nth-child(10) { width: 10%; } /* 醫師社群 */
        .table colgroup col:nth-child(11) { width: 16%; } /* 操作 */
        
        /* 儲存格樣式 */
        .table td, .table th {
            padding: 12px 8px;
            vertical-align: middle;
            font-size: 14px;
            line-height: 1.5;
        }
        
        /* 文字處理 */
        .table td {
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        
        /* 標題不換行 */
        .table th {
            white-space: nowrap;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- 登入畫面 -->
    <div id="loginContainer" class="login-container" style="display: none;">
        <div class="main-container">
            <h2 class="text-center header-title mb-4">
                <i class="bi bi-hospital"></i> BCM 醫師管理系統
            </h2>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">帳號</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">密碼</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-custom w-100">登入</button>
            </form>
        </div>
    </div>

    <!-- 主畫面 -->
    <div id="mainContainer" class="container" style="display: none;">
        <div class="main-container">
            <!-- 標題列 -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="header-title">
                    <i class="bi bi-hospital"></i> BCM 醫師管理系統
                </h1>
                <div>
                    <span id="userInfo" class="me-3"></span>
                    <button onclick="logout()" class="btn btn-outline-danger">
                        <i class="bi bi-box-arrow-right"></i> 登出
                    </button>
                </div>
            </div>

            <!-- 統計卡片 -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="mb-0">總醫師數</p>
                                <h3 id="totalCount">0</h3>
                            </div>
                            <i class="bi bi-people-fill" style="font-size: 3rem; opacity: 0.3;"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="mb-0">已簽約</p>
                                <h3 id="contractedCount">0</h3>
                            </div>
                            <i class="bi bi-file-earmark-check-fill" style="font-size: 3rem; opacity: 0.3;"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="mb-0">合作過</p>
                                <h3 id="cooperatedCount">0</h3>
                            </div>
                            <i class="bi bi-clock-history" style="font-size: 3rem; opacity: 0.3;"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 搜尋與操作區 -->
            <div class="search-section">
                <!-- 篩選區域與按鈕 -->
                <div class="filter-row">
                    <div class="filter-group search">
                        <input type="text" class="form-control" id="searchInput" placeholder="🔍 搜尋醫師">
                    </div>
                    <div class="filter-group">
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary dropdown-toggle w-100" type="button"
                                    id="specialtyDropdownBtn" data-bs-toggle="dropdown" data-bs-auto-close="outside">
                                所有科別
                            </button>
                            <ul class="dropdown-menu specialty-menu" id="specialtyDropdownMenu"></ul>
                        </div>
                    </div>
                    <div class="filter-group small">
                        <select class="form-select" id="genderFilter">
                            <option value="">所有性別</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <select class="form-select" id="statusFilter">
                            <option value="">所有狀態</option>
                            <option value="已簽約">已簽約</option>
                            <option value="合作過">合作過</option>
                            <option value="聯繫過">聯繫過</option>
                            <option value="有經紀">有經紀</option>
                            <option value="未聯繫">未聯繫</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <select class="form-select" id="hasSocialMediaFilter">
                            <option value="">經營社群</option>
                            <option value="是">是</option>
                            <option value="否">否</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <select class="form-select" id="priceFilter">
                            <option value="">所有報價</option>
                            <option value="low">10萬以下</option>
                            <option value="mid">10–30萬</option>
                            <option value="high">30萬以上</option>
                            <option value="none">未填寫</option>
                        </select>
                    </div>
                    <!-- 操作按鈕區域 -->
                    <div class="action-buttons">
                        <button onclick="addDoctor()" class="btn btn-custom">
                            <i class="bi bi-plus-circle"></i> 新增醫師
                        </button>
                        <button id="importExcelBtn" onclick="document.getElementById('fileInput').click()" class="btn btn-info" style="display: none;">
                            <i class="bi bi-file-earmark-arrow-up"></i> 匯入 Excel
                        </button>
                        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;" onchange="importExcel(event)">
                        <button id="exportExcelBtn" onclick="exportExcel()" class="btn btn-success" style="display: none;">
                            <i class="bi bi-file-earmark-excel"></i> 匯出 Excel
                        </button>
                    </div>
                </div>
            </div>

            <!-- 醫師列表 -->
            <div class="table-container">
                <table class="table table-hover">
                    <colgroup>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col> <!-- 合作品牌 -->
                        <col>
                        <col>
                        <col>
                        <col>
                    </colgroup>
                    <thead class="table-light sticky-top">
                        <tr>
                            <th>編號</th>
                            <th onclick="sortBy('name')" style="cursor:pointer">醫師 <span id="sort-name"></span></th>
                            <th>科別</th>
                            <th>性別</th>
                            <th onclick="sortBy('status')" style="cursor:pointer">狀態 <span id="sort-status"></span></th>
                            <th>聯絡窗口</th>
                            <th>合作品牌</th>
                            <th onclick="sortBy('price')" style="cursor:pointer">報價區間 <span id="sort-price"></span></th>
                            <th>經營社群</th>
                            <th>醫師社群</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="doctorList">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 新增/編輯醫師 Modal -->
    <div class="modal fade" id="doctorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增醫師</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="doctorForm">
                        <input type="hidden" id="doctorId">
                        <div class="mb-3">
                            <label class="form-label">醫師</label>
                            <input type="text" class="form-control" id="doctorEmail">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">科別</label>
                            <select class="form-select" id="doctorSpecialty">
                                <option value="">請選擇科別</option>
                                <option value="小兒科">小兒科</option>
                                <option value="家醫科">家醫科</option>
                                <option value="耳鼻喉科">耳鼻喉科</option>
                                <option value="內科">內科</option>
                                <option value="外科">外科</option>
                                <option value="醫美">醫美</option>
                                <option value="婦產科">婦產科</option>
                                <option value="皮膚科">皮膚科</option>
                                <option value="泌尿科">泌尿科</option>
                                <option value="精神科">精神科</option>
                                <option value="中醫師">中醫師</option>
                                <option value="營養師">營養師</option>
                                <option value="復健科">復健科</option>
                                <option value="腎臟科">腎臟科</option>
                                <option value="心臟科">心臟科</option>
                                <option value="神經科">神經科</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">性別</label>
                            <select class="form-select" id="doctorGender">
                                <option value="">請選擇</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">狀態</label>
                            <select class="form-select" id="doctorStatus">
                                <option value="已簽約">已簽約</option>
                                <option value="合作過">合作過</option>
                                <option value="聯繫過">聯繫過</option>
                                <option value="有經紀">有經紀</option>
                                <option value="未聯繫">未聯繫</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">聯絡窗口</label>
                            <select class="form-select" id="doctorContactPerson">
                                <option value="">請選擇</option>
                                <option value="Nathan">Nathan</option>
                                <option value="Chloe">Chloe</option>
                                <option value="Tim">Tim</option>
                                <option value="Tiffany">Tiffany</option>
                                <option value="公司">公司</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">合作品牌</label>
                            <input type="text" class="form-control" id="doctorCurrentBrand" placeholder="請輸入合作品牌">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">經營社群</label>
                            <select class="form-select" id="doctorHasSocialMedia">
                                <option value="">請選擇</option>
                                <option value="是">是</option>
                                <option value="否">否</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">報價區間</label>
                            <input type="text" class="form-control" id="doctorPriceRange" placeholder="例如：10,000-50,000">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">醫師社群</label>
                            <input type="url" class="form-control" id="doctorSocialMediaLink" placeholder="請輸入連結網址">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-custom" onclick="saveDoctor()">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let isAdmin = false;
        let currentDoctors = [];
        let selectedSpecialties = new Set();
        let sortCol = null;
        let sortDir = 1;

        // 檢查登入狀態
        async function checkAuth() {
            const response = await fetch('/check_auth');
            const data = await response.json();
            
            if (data.logged_in) {
                isAdmin = data.is_admin;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                document.getElementById('userInfo').textContent = `👤 ${data.username} ${isAdmin ? '(主管)' : '(一般)'}`;
                // 只有管理员才显示导出Excel按钮
                document.getElementById('importExcelBtn').style.display = isAdmin ? 'inline-block' : 'none';
                document.getElementById('exportExcelBtn').style.display = isAdmin ? 'inline-block' : 'none';
                loadData();
            } else {
                document.getElementById('loginContainer').style.display = 'block';
                document.getElementById('mainContainer').style.display = 'none';
            }
        }

        // 登入
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            
            if (response.ok) {
                checkAuth();
            } else {
                alert('登入失敗！請檢查帳號密碼');
            }
        });

        // 登出
        async function logout() {
            await fetch('/logout', {method: 'POST'});
            checkAuth();
        }

        // 載入資料
        async function loadData() {
            await loadStats();
            await loadDoctors();
            // 只在初始載入時更新科別建議列表
            if (!window.specialtySuggestionsLoaded) {
                await updateSpecialtySuggestions();
                window.specialtySuggestionsLoaded = true;
            }
        }

        // 載入統計
        async function loadStats() {
            const response = await fetch('/api/stats');
            const data = await response.json();
            
            document.getElementById('totalCount').textContent = data.total;
            document.getElementById('contractedCount').textContent = data.contracted;
            document.getElementById('cooperatedCount').textContent = data.cooperated;
        }

        // 從報價字串抓第一個數字（支援 "70,000(議)" 等格式）
        function extractPrice(str) {
            if (!str) return null;
            const match = String(str).replace(/,/g, '').match(/\d+/);
            return match ? parseInt(match[0]) : null;
        }

        // 欄位排序
        function sortBy(col) {
            if (sortCol === col) { sortDir *= -1; }
            else { sortCol = col; sortDir = 1; }
            ['name', 'price', 'status'].forEach(c => {
                const el = document.getElementById(`sort-${c}`);
                if (el) el.textContent = c === sortCol ? (sortDir === 1 ? ' ▲' : ' ▼') : '';
            });
            loadDoctors();
        }

        // 科別多選 toggle
        function toggleSpecialty(checkbox) {
            if (checkbox.checked) selectedSpecialties.add(checkbox.value);
            else selectedSpecialties.delete(checkbox.value);
            updateSpecialtyBtn();
            loadDoctors();
        }

        function updateSpecialtyBtn() {
            const btn = document.getElementById('specialtyDropdownBtn');
            if (selectedSpecialties.size === 0) btn.textContent = '所有科別';
            else if (selectedSpecialties.size === 1) btn.textContent = `${[...selectedSpecialties][0]}`;
            else btn.textContent = `${selectedSpecialties.size} 個科別`;
        }

        // 載入醫師列表
        async function loadDoctors() {
            const search = document.getElementById('searchInput').value;
            const gender = document.getElementById('genderFilter').value;
            const status = document.getElementById('statusFilter').value;
            const hasSocialMedia = document.getElementById('hasSocialMediaFilter').value;
            const priceFilter = document.getElementById('priceFilter').value;

            const params = new URLSearchParams({search, gender, status});
            if (hasSocialMedia) params.append('has_social_media', hasSocialMedia);

            const response = await fetch(`/api/doctors?${params}`);
            let doctors = await response.json();

            // 科別多選過濾（client-side）
            if (selectedSpecialties.size > 0) {
                doctors = doctors.filter(d => selectedSpecialties.has(d.specialty));
            }

            // 報價過濾（client-side，智慧解析數字）
            if (priceFilter) {
                doctors = doctors.filter(d => {
                    const price = extractPrice(d.price_range);
                    if (priceFilter === 'none') return price === null;
                    if (priceFilter === 'low')  return price !== null && price < 100000;
                    if (priceFilter === 'mid')  return price !== null && price >= 100000 && price <= 300000;
                    if (priceFilter === 'high') return price !== null && price > 300000;
                });
            }

            // 排序
            if (sortCol) {
                const statusOrder = {'已簽約': 0, '合作過': 1, '聯繫過': 2, '有經紀': 3, '未聯繫': 4};
                doctors.sort((a, b) => {
                    let va, vb;
                    if (sortCol === 'name')   { va = a.email||a.name||''; vb = b.email||b.name||''; }
                    if (sortCol === 'price')  { va = extractPrice(a.price_range) ?? Infinity; vb = extractPrice(b.price_range) ?? Infinity; }
                    if (sortCol === 'status') { va = statusOrder[a.status] ?? 99; vb = statusOrder[b.status] ?? 99; }
                    return va < vb ? -sortDir : va > vb ? sortDir : 0;
                });
            }

            currentDoctors = doctors;
            renderDoctors();
        }

        // 更新科別選單（動態添加新科別）
        async function updateSpecialtySuggestions() {
            // 獲取所有醫師資料以提取科別（不受篩選影響）
            const response = await fetch('/api/doctors');
            const allDoctors = await response.json();
            
            // 提取所有唯一的科別
            const specialties = [...new Set(allDoctors.map(d => d.specialty).filter(s => s && s.trim()))];
            
            // 預設科別選項（按順序）
            const defaultSpecialties = ['小兒科', '家醫科', '耳鼻喉科', '內科', '外科', '眼科', '牙科', '骨科', '醫美', '皮膚科', '婦產科', '泌尿科', '精神科', '復健科', '神經科', '腸胃科', '腎臟科', '心臟科', '新陳代謝科', '預防醫學', '一般科', '中醫師', '植髮醫師', '營養師', '藥師', '護理師', '物理治療師'];
            const allSpecialties = [...new Set([...defaultSpecialties, ...specialties])];
            
            // 更新科別 dropdown checkboxes
            const menu = document.getElementById('specialtyDropdownMenu');
            menu.innerHTML = '';
            allSpecialties.forEach(spec => {
                const checked = selectedSpecialties.has(spec) ? 'checked' : '';
                const li = document.createElement('li');
                li.innerHTML = `<label class="dropdown-item"><input type="checkbox" value="${escapeHtml(spec)}" ${checked} onchange="toggleSpecialty(this)"> ${escapeHtml(spec)}</label>`;
                menu.appendChild(li);
            });
            updateSpecialtyBtn();

            // 更新表單選單
            const doctorSpecialty = document.getElementById('doctorSpecialty');
            const currentFormValue = doctorSpecialty.value;
            doctorSpecialty.innerHTML = '<option value="">請選擇科別</option>';
            allSpecialties.forEach(spec => {
                const option = document.createElement('option');
                option.value = spec;
                option.textContent = spec;
                doctorSpecialty.appendChild(option);
            });
            doctorSpecialty.value = currentFormValue;
        }

        // 轉義 HTML 特殊字符，防止 XSS
        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 複製社群連結
        function copyLink(btn, url) {
            navigator.clipboard.writeText(url).then(() => {
                const icon = btn.querySelector('i');
                icon.className = 'bi bi-clipboard-check';
                btn.classList.replace('btn-outline-secondary', 'btn-outline-success');
                setTimeout(() => {
                    icon.className = 'bi bi-clipboard';
                    btn.classList.replace('btn-outline-success', 'btn-outline-secondary');
                }, 1500);
            });
        }

        // 渲染醫師列表
        function renderDoctors() {
            const tbody = document.getElementById('doctorList');
            tbody.innerHTML = '';

            currentDoctors.forEach((doctor, index) => {
                const statusBadge = getStatusBadge(doctor.status);
                // 只允許 http/https 連結，防止 javascript: 協議注入
                let socialMediaLink = '-';
                if (doctor.social_media_link) {
                    const url = doctor.social_media_link.trim();
                    if (url.startsWith('http://') || url.startsWith('https://')) {
                        const safeUrl = escapeHtml(url);
                        socialMediaLink = `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="text-primary me-1"><i class="bi bi-link-45deg"></i> 連結</a><button class="btn btn-sm btn-outline-secondary py-0 px-1 copy-btn" onclick="copyLink(this, '${safeUrl}')" title="複製連結"><i class="bi bi-clipboard"></i></button>`;
                    } else {
                        socialMediaLink = escapeHtml(url);
                    }
                }
                const displayNumber = index + 1;
                const row = `
                    <tr>
                        <td>${displayNumber}</td>
                        <td style="font-size: 0.9rem;">${escapeHtml(doctor.email || doctor.name) || '-'}</td>
                        <td>${escapeHtml(doctor.specialty) || '-'}</td>
                        <td>${escapeHtml(doctor.gender) || '-'}</td>
                        <td>${statusBadge}</td>
                        <td>${escapeHtml(doctor.contact_person) || '-'}</td>
                        <td>${escapeHtml(doctor.current_brand) || '-'}</td>
                        <td>${formatPriceRange(doctor.price_range)}</td>
                        <td>${escapeHtml(doctor.has_social_media) || '-'}</td>
                        <td>${socialMediaLink}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="editDoctor(${doctor.id})">
                                <i class="bi bi-pencil"></i> 編輯
                            </button>
                            ${isAdmin ? `
                            <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteDoctor(${doctor.id})">
                                <i class="bi bi-trash"></i> 刪除
                            </button>
                            ` : ''}
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // 取得狀態標籤
        function getStatusBadge(status) {
            const badges = {
                '已簽約': '<span class="badge bg-success">已簽約</span>',
                '合作過': '<span class="badge bg-info">合作過</span>',
                '聯繫過': '<span class="badge bg-primary">聯繫過</span>',
                '有經紀': '<span class="badge bg-warning">有經紀</span>',
                '未聯繫': '<span class="badge bg-secondary">未聯繫</span>'
            };
            return badges[status] || status;
        }

        // 格式化報價區間（添加千位分隔符）
        function formatPriceRange(priceRange) {
            if (!priceRange || priceRange === '-') return '-';
            
            // 嘗試提取數字部分
            const numbers = priceRange.match(/\d+/g);
            if (!numbers) return priceRange;
            
            // 將數字格式化為帶千位分隔符的格式
            let formatted = priceRange;
            numbers.forEach(num => {
                const formattedNum = parseInt(num).toLocaleString('zh-TW');
                formatted = formatted.replace(num, formattedNum);
            });
            
            return formatted;
        }

        // 新增醫師
        function addDoctor() {
            document.getElementById('modalTitle').textContent = '新增醫師';
            document.getElementById('doctorForm').reset();
            document.getElementById('doctorId').value = '';
            new bootstrap.Modal(document.getElementById('doctorModal')).show();
        }

        // 編輯醫師
        function editDoctor(id) {
            const doctor = currentDoctors.find(d => d.id === id);
            document.getElementById('modalTitle').textContent = '編輯醫師';
            document.getElementById('doctorId').value = doctor.id;
            // 優先使用 email，如果沒有則使用 name（與表格顯示邏輯一致）
            document.getElementById('doctorEmail').value = doctor.email || doctor.name || '';
            document.getElementById('doctorSpecialty').value = doctor.specialty || '';
            document.getElementById('doctorGender').value = doctor.gender || '';
            document.getElementById('doctorStatus').value = doctor.status || '';
            document.getElementById('doctorContactPerson').value = doctor.contact_person || '';
            document.getElementById('doctorHasSocialMedia').value = doctor.has_social_media || '';
            document.getElementById('doctorSocialMediaLink').value = doctor.social_media_link || '';
            document.getElementById('doctorCurrentBrand').value = doctor.current_brand || '';
            document.getElementById('doctorPriceRange').value = doctor.price_range || '';
            new bootstrap.Modal(document.getElementById('doctorModal')).show();
        }

        // 儲存醫師
        async function saveDoctor() {
            const id = document.getElementById('doctorId').value;
            const doctorName = document.getElementById('doctorEmail').value; // 醫師名稱
            const data = {
                name: doctorName,  // 同時設置 name 和 email
                email: doctorName,
                specialty: document.getElementById('doctorSpecialty').value,
                gender: document.getElementById('doctorGender').value,
                status: document.getElementById('doctorStatus').value,
                contact_person: document.getElementById('doctorContactPerson').value,
                has_social_media: document.getElementById('doctorHasSocialMedia').value,
                social_media_link: document.getElementById('doctorSocialMediaLink').value,
                current_brand: document.getElementById('doctorCurrentBrand').value,
                price_range: document.getElementById('doctorPriceRange').value
            };
            
            const url = id ? `/api/doctors/${id}` : '/api/doctors';
            const method = id ? 'PUT' : 'POST';
            
            const response = await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                bootstrap.Modal.getInstance(document.getElementById('doctorModal')).hide();
                loadData();
                updateSpecialtySuggestions();
            } else {
                const errorData = await response.json();
                alert('儲存失敗！\n' + (errorData.error || '未知錯誤'));
            }
        }

        // 刪除醫師
        async function deleteDoctor(id) {
            if (!isAdmin) {
                alert('只有主管才能刪除醫師！');
                return;
            }
            
            if (!confirm('確定要刪除這位醫師嗎？此操作無法復原！')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/doctors/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert('刪除成功！');
                    loadData();
                } else {
                    const errorData = await response.json();
                    alert('刪除失敗！\n' + (errorData.error || '未知錯誤'));
                }
            } catch (error) {
                alert('刪除失敗！\n' + error.message);
            }
        }

        // 匯入 Excel
        async function importExcel(event) {
            if (!isAdmin) {
                alert('只有主管才能匯入Excel！');
                event.target.value = ''; // 清空文件選擇
                return;
            }
            
            const file = event.target.files[0];
            if (!file) {
                return;
            }
            
            // 檢查檔案格式（只支援 openpyxl 支援的格式）
            const allowedExtensions = ['.xlsx', '.xlsm', '.xltx', '.xltm'];
            const fileExt = file.name.toLowerCase().substring(file.name.lastIndexOf('.'));
            if (!allowedExtensions.includes(fileExt)) {
                alert('檔案格式錯誤！\n\n請選擇 Excel 檔案（支援格式：.xlsx、.xlsm、.xltx、.xltm）\n\n如果您的檔案是 .xls 格式，請先用 Excel 轉換為 .xlsx 格式。');
                event.target.value = '';
                return;
            }
            
            // 檢查檔案大小（限制 10MB）
            if (file.size > 10 * 1024 * 1024) {
                alert('檔案過大！\n\n請選擇小於 10MB 的檔案。');
                event.target.value = '';
                return;
            }
            
            if (file.size === 0) {
                alert('檔案為空！\n\n請選擇有效的 Excel 檔案。');
                event.target.value = '';
                return;
            }
            
            // 確認匯入
            if (!confirm(`確定要匯入檔案「${file.name}」嗎？\n\n注意：已存在的醫師（相同名稱）將被跳過。`)) {
                event.target.value = '';
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);

            // 顯示 loading 狀態，防止重複點擊
            const importBtn = document.getElementById('importExcelBtn');
            const originalHTML = importBtn.innerHTML;
            importBtn.disabled = true;
            importBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> 匯入中...';

            try {
                const response = await fetch('/api/import', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    let message = `匯入成功！\n成功匯入 ${result.success_count} 筆資料`;
                    if (result.errors && result.errors.length > 0) {
                        message += `\n\n警告：\n${result.errors.slice(0, 10).join('\n')}`;
                        if (result.errors.length > 10) {
                            message += `\n... 還有 ${result.errors.length - 10} 個警告`;
                        }
                    }
                    alert(message);
                    // 重新載入醫師列表
                    loadDoctors();
                    loadStats();
                } else {
                    let errorMsg = '匯入失敗！';
                    if (result.error) {
                        errorMsg += '\n' + result.error;
                    }
                    if (result.message) {
                        errorMsg += '\n' + result.message;
                    }
                    if (result.errors && result.errors.length > 0) {
                        errorMsg += '\n\n錯誤詳情：\n' + result.errors.slice(0, 5).join('\n');
                        if (result.errors.length > 5) {
                            errorMsg += `\n... 還有 ${result.errors.length - 5} 個錯誤`;
                        }
                    }
                    alert(errorMsg);
                }
            } catch (error) {
                let errorMsg = '匯入失敗！\n\n';
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    errorMsg += '網路連線錯誤，請檢查網路連線後重試。';
                } else {
                    errorMsg += error.message;
                }
                alert(errorMsg);
            } finally {
                // 還原按鈕狀態，清空文件選擇
                importBtn.disabled = false;
                importBtn.innerHTML = originalHTML;
                event.target.value = '';
            }
        }

        // 匯出 Excel
        async function exportExcel() {
            if (!isAdmin) {
                alert('只有主管才能匯出Excel！');
                return;
            }
            
            try {
                const response = await fetch('/api/export');
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = '醫師資料.xlsx';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    const errorData = await response.json();
                    alert('匯出失敗！\n' + (errorData.error || '未知錯誤'));
                }
            } catch (error) {
                alert('匯出失敗！\n' + error.message);
            }
        }

        // 監聽篩選變化
        document.getElementById('searchInput').addEventListener('input', loadDoctors);
        document.getElementById('genderFilter').addEventListener('change', loadDoctors);
        document.getElementById('statusFilter').addEventListener('change', loadDoctors);
        document.getElementById('hasSocialMediaFilter').addEventListener('change', loadDoctors);
        document.getElementById('priceFilter').addEventListener('change', loadDoctors);

        // 初始化
        checkAuth();
    </script>
</body>
</html>
